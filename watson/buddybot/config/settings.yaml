input_mode:
  allow_text: true
  allow_voice: true

voice:
  max_record_seconds: 10
  transcription_mode: "online"   # or "offline"
  language: "en-US"

llm:
  # Use 'ollama list' to see available models. TinyLlama is a lightweight default.
  model: "tinyllama"
  api_url: "http://localhost:11434/api/generate"
